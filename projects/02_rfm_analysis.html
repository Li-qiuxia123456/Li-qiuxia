  <!-- 参考答案代码 -->
  <script id="answer-code" type="text/plain">
import pandas as pd
import io

# 1) 基础数据预处理
df['order_date'] = pd.to_datetime(df['order_date'])
today = df['order_date'].max()

# 2) 计算 RFM
rfm = df.groupby('user_id').agg(
    Recency=('order_date', lambda x: (today - x.max()).days),
    Frequency=('order_date', 'count'),
    Monetary=('amount', 'sum')
).reset_index()

print("=== RFM 汇总 ===")
print(f"用户总数: {len(rfm)}, 订单总数: {len(df)}")
print(f"总营业额: {rfm['Monetary'].sum():.2f}")
show(rfm.describe())

# 3) 使用分位数给每个维度打分 (1-5 分)
# Recency 越小越好，所以需要反转
def r_score(x, q):
    if x <= q[0.2]: return 5
    elif x <= q[0.4]: return 4
    elif x <= q[0.6]: return 3
    elif x <= q[0.8]: return 2
    else: return 1

def fm_score(x, q):
    if x <= q[0.2]: return 1
    elif x <= q[0.4]: return 2
    elif x <= q[0.6]: return 3
    elif x <= q[0.8]: return 4
    else: return 5

r_q = rfm['Recency'].quantile([0.2, 0.4, 0.6, 0.8])
f_q = rfm['Frequency'].quantile([0.2, 0.4, 0.6, 0.8])
m_q = rfm['Monetary'].quantile([0.2, 0.4, 0.6, 0.8])

rfm['R_score'] = rfm['Recency'].apply(lambda x: r_score(x, r_q))
rfm['F_score'] = rfm['Frequency'].apply(lambda x: fm_score(x, f_q))
rfm['M_score'] = rfm['Monetary'].apply(lambda x: fm_score(x, m_q))
rfm['RFM_score'] = rfm['R_score'] + rfm['F_score'] + rfm['M_score']

# 4) 用户分层
def segment(row):
    r, f, m = row['R_score'], row['F_score'], row['M_score']
    if r >= 4 and f >= 4 and m >= 4: return '重要价值客户'
    elif r <= 2 and f >= 4 and m >= 4: return '重要挽留客户'
    elif r >= 4 and f <= 2 and m <= 2: return '新客户'
    elif r <= 2 and f <= 2 and m <= 2: return '流失预警客户'
    elif r >= 4 and f >= 3 and m >= 3: return '活跃客户'
    else: return '一般客户'

rfm['segment'] = rfm.apply(segment, axis=1)

print("\n=== 用户分层结果 ===")
seg_count = rfm.groupby('segment').agg(
    用户数=('user_id', 'count'),
    平均消费=('Monetary', 'mean'),
    平均频率=('Frequency', 'mean')
).reset_index()
seg_count = seg_count.sort_values('用户数', ascending=False)
show(seg_count)

print("\n=== 各层用户贡献占比 ===")
total_monetary = rfm['Monetary'].sum()
seg_monetary = rfm.groupby('segment')['Monetary'].sum().sort_values(ascending=False).reset_index()
seg_monetary.columns = ['用户分层', '总消费金额']
seg_monetary['金额占比'] = seg_monetary['总消费金额'] / total_monetary
show(seg_monetary)

# 5) 展示每个分层的典型用户 Top3
print("\n=== 各分层的典型代表用户 ===")
for seg in seg_count['segment']:
    print(f"\n---- {seg} ----")
    subset = rfm[rfm['segment'] == seg].sort_values('Monetary', ascending=False).head(3)
    show(subset[['user_id', 'Recency', 'Frequency', 'Monetary', 'RFM_score']])
  </script>

    import { EditorState } from '@codemirror/state';
    import { EditorView, keymap, lineNumbers, highlightActiveLine } from '@codemirror/view';
    import { defaultKeymap, history, historyKeymap } from 'codemirror';
    import { python } from '@codemirror/lang-python';
    import { oneDark } from '@codemirror/theme-one-dark';

    const PROJECT_ID = '02_rfm_analysis';
    const csvText = document.getElementById('csv-data').textContent.trim();
    const defaultCode = document.getElementById('default-code').textContent.trim();
    const answerCode = document.getElementById('answer-code').textContent.trim();

    // ====== 数据预览表格渲染 ======
    (function renderDataPreview() {
      const tbody = document.querySelector('#data-preview tbody');
      const lines = csvText.split('\n').slice(1); // skip header
      const frag = document.createDocumentFragment();
      lines.slice(0, 30).forEach(function(line) {
        const cells = line.split(',');
        const tr = document.createElement('tr');
        cells.forEach(function(c) {
          const td = document.createElement('td');
          td.textContent = c;
          tr.appendChild(td);
        });
        frag.appendChild(tr);
      });
      tbody.appendChild(frag);
    })();

    // ====== Vue 实例（仅用于完成状态显示） ======
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const completed = ref(false);
        onMounted(function() {
          completed.value = PandasCampStorage.isCompleted(PROJECT_ID);
        });
        return { completed };
      }
    }).mount('#app');

    // ====== CodeMirror ======
    const initialCode = PandasCampStorage.getCode(PROJECT_ID) || defaultCode;
    const view = new EditorView({
      doc: initialCode,
      extensions: [
        lineNumbers(),
        highlightActiveLine(),
        python(),
        oneDark,
        history(),
        keymap.of([...defaultKeymap, ...historyKeymap]),
        EditorView.updateListener.of(function(update) {
          if (update.docChanged) {
            PandasCampStorage.saveCode(PROJECT_ID, view.state.doc.toString());
          }
        })
      ],
      parent: document.getElementById('editor')
    });

    function setEditorContent(text) {
      view.dispatch({
        changes: { from: 0, to: view.state.doc.length, insert: text }
      });
    }

    // ====== 按钮事件 ======
    const outputEl = document.getElementById('output-console');
    const statusPill = document.getElementById('status-pill');

    document.getElementById('run-btn').addEventListener('click', function() {
      const code = view.state.doc.toString();
      PandasCampRunner.run(code, csvText, outputEl, statusPill);
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
      setEditorContent(defaultCode);
      PandasCampStorage.saveCode(PROJECT_ID, defaultCode);
      outputEl.innerHTML = '<pre class="text-output muted">（已重置为默认代码）</pre>';
    });

    document.getElementById('answer-btn').addEventListener('click', function() {
      setEditorContent(answerCode);
      PandasCampStorage.saveCode(PROJECT_ID, answerCode);
      outputEl.innerHTML = '<pre class="text-output muted">（已切换为参考答案代码，点击运行按钮查看结果）</pre>';

    document.getElementById('complete-btn').addEventListener('click', function() {
      PandasCampStorage.markComplete(PROJECT_ID);
      outputEl.innerHTML = '<div class="celebrate" style="background:linear-gradient(135deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15)); border:1px solid #10b981; border-radius:14px; padding:18px; text-align:center; margin-bottom:22px; color:#10b981; font-weight:600;">🎉 恭喜完成项目！进度已保存到本地。</div>' + outputEl.innerHTML;
      statusPill.textContent = '✓ 已完成';
      // 触发 Vue 重新渲染完成状态
      const banner = document.querySelector('.celebrate');
      if (!banner || banner.innerHTML.indexOf('完成本项目') === -1) {
        // 重新刷新页面的完成状态（通过重新挂载 Vue 的方式更简单：刷新页面）
        setTimeout(function() { location.reload(); }, 1200);
      }
    });

    // 预加载 Pyodide（不阻塞 UI）

      statusPill.textContent = 'Python 环境加载中...';

        statusPill.textContent = '准备就绪';
      }).catch(function(err) {
        statusPill.textContent = '环境加载失败';
        console.error(err);
